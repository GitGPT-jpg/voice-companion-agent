<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💕 灵魂伴侣</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body class="">

  <!-- Aurora 背景光晕 -->
  <div class="aurora-bg" aria-hidden="true"><span></span></div>

  <!-- 顶栏 -->
  <div class="topbar" id="topbar">
    <div class="topbar-name">
      <span data-i18n="app_name">灵魂伴侣</span>
      <span id="status-dot" class="dot idle"></span>
    </div>
    <div class="topbar-actions">
      <button id="callBtn" class="call-btn" data-i18n-title="call_title" title="打电话">📞</button>
      <button class="lang-toggle" data-lang-toggle>English</button>
      <a class="logout-btn" href="/logout" data-i18n="logout">退出</a>
    </div>
  </div>

  <!-- 头像区 -->
  <div class="avatar-wrap" id="avatarWrap">
    <canvas id="glowCanvas" width="220" height="220"></canvas>
    <div class="avatar-circle" id="avatarCircle">
      <img src="/static/avatar.png" alt="男友头像" data-i18n-aria-label="avatar_alt">
    </div>
  </div>

  <!-- 状态文字 -->
  <div id="status-text" class="status-text" data-i18n="status_online">在线 · 等你说话</div>

  <!-- 通话中提示 -->
  <div id="callBanner" class="call-banner hidden">
    <div class="call-banner-info">
      <span class="call-dot"></span>
      <span id="callTimer">00:00</span>
    </div>
    <div class="call-banner-text" id="callSubtitle" data-i18n="status_listening">正在听…</div>
  </div>

  <!-- 挂断按钮 -->
  <button id="hangUpBtn" class="hangup-btn hidden">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
    </svg>
  </button>

  <!-- 唱歌停止按钮 -->
  <button id="stopSingBtn" class="stop-btn hidden" data-i18n="stop_singing">⏹ 停止唱歌</button>

  <!-- 消息区 -->
  <div class="chat-area" id="chatArea"></div>

  <!-- 快捷回复 -->
  <div class="quick-replies" id="quickRow"></div>

  <!-- 输入栏 -->
  <div class="input-area" id="inputArea">
    <button id="micBtn" class="mic-btn" data-i18n-title="voice_input_title" title="语音输入">🎤</button>
    <input id="inputBox" type="text" data-i18n-placeholder="input_placeholder" placeholder="打字或按🎤说话…" autocomplete="off">
    <button id="sendBtn" class="send-btn">➤</button>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/static/i18n.js?v=1"></script>
  <script src="/static/chat.js?v=6"></script>
</body>
</html>
